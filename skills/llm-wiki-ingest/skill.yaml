name: llm-wiki-ingest
purpose: >
  Convert raw knowledge sources into persistent wiki pages with traceability,
  deduplication checks, and structured extraction of concepts, entities, and syntheses.
  Supports --deep flag for exhaustive 4-pass extraction: structure map, claim-level
  extraction, relationship triples, and cross-wiki contradiction scan.
trigger:
  user_phrases:
    - ingest
    - 摄入
    - 处理这个
    - process this source
    - add to wiki
    - deep ingest
    - --deep
    - 仔细
    - 非常仔细
    - exhaustive ingest
    - thorough ingest
  intent_signals:
    - The user provides a raw file to be compiled into wiki pages.
    - The user wants source material converted to grounded wiki knowledge.
    - The user provides a .docx, Word, or PDF file to add to the knowledge base.
    - The user wants maximum extraction depth, claim-level sourcing, or relationship mapping.
inputs:
  required:
    - name: source_path
      description: >
        Path to the raw file or folder to ingest. Accepts markdown (.md), Word (.docx),
        PDF (.pdf), or any text file. Word files are converted via pandoc before ingest;
        PDFs are converted via marker/pymupdf4llm/pdftotext before ingest.
  optional:
    - name: focus
      description: Specific aspect or angle to prioritize during extraction.
    - name: deep
      description: >
        Flag (--deep) enabling 4-pass exhaustive extraction protocol: (1) structure map,
        (2) claim-level extraction table, (3) entity-relationship triples, (4) cross-wiki
        contradiction scan. Enforces claim-level sourcing, relationship sections on all
        pages, and mandatory question generation. Use for dense technical sources,
        foundational references, or any source the user wants fully mined.
outputs:
  primary:
    - path: wiki/sources/<slug>.md
      description: Grounding source page created for the input material.
    - path: wiki/concepts/<name>.md
      description: Concept pages extracted from the source.
    - path: wiki/entities/<name>.md
      description: Entity pages extracted from the source.
  side_effects:
    - wiki/index.md updated with new entries.
    - wiki/log.md appended.
    - wiki/syntheses/ may be updated if new material bridges existing gaps.
    - (docx only) <slug>.md written alongside the original .docx file.
    - (docx only) raw/assets/<slug>/ created with extracted images.
    - (pdf only) <slug>.md written alongside the original .pdf file.
dependencies:
  skills: []
  scripts: []
  tools:
    - pandoc        # required for .docx input only
    - marker_single # preferred for .pdf input (pip install marker-pdf)
    - pymupdf4llm   # fallback for .pdf input (pip install pymupdf4llm)
    - pdftotext     # last-resort fallback for .pdf input (brew install poppler)
  env: []
  external_services: []
failure_modes:
  - mode: missing_frontmatter
    detection: Raw file lacks title, date, or type fields in frontmatter.
    response: Derive title from first heading or filename; proceed with defaults.
  - mode: duplicate_source
    detection: A wiki/sources/ page already covers this material.
    response: Check for content drift; update incrementally rather than overwrite.
  - mode: raw_write_attempted
    detection: Workflow would modify raw/ beyond the clippings tag exception, docx image extraction, and pdf conversion output.
    response: Stop immediately; raw/ is immutable by system contract.
  - mode: pdf_no_text
    detection: PDF is image-only (scanned); no text extractable by any tool.
    response: Report that OCR is out of scope and stop.
  - mode: pdf_converter_not_installed
    detection: None of marker_single, pymupdf4llm, or pdftotext are available.
    response: Report which tools are missing and suggest install commands; stop.
  - mode: pandoc_not_installed
    detection: pandoc binary not found when input is a .docx file.
    response: Report error and stop; do not attempt manual conversion.
  - mode: pandoc_conversion_failed
    detection: pandoc exits non-zero or produces empty output.
    response: Report the pandoc error message verbatim and stop.
evaluation:
  success_signals:
    - wiki/sources/ page created or updated.
    - At least one concept or entity page produced.
    - wiki/index.md reflects new entries.
    - wiki/log.md updated.
  checks:
    - Confirm source page contains graph-excluded frontmatter.
    - Confirm concept/entity pages link back to source.
  artifacts:
    - wiki/sources/
    - wiki/concepts/
    - wiki/entities/
    - wiki/index.md
    - wiki/log.md
schedule_eligibility:
  eligible: false
  execution_mode: local_only
  rationale: Requires human judgment for source selection and extraction focus.
  cadence_examples: []
security:
  risk_level: write
  confirmation_required: false
  reason: Creates wiki pages from raw sources; non-destructive, raw/ is immutable by contract.
  write_paths: ["wiki/sources/", "raw/assets/"]
agents: [claude, codex]
